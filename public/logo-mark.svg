<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="sci-pond" x1="8" y1="6" x2="94" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071e22"/>
      <stop offset="0.55" stop-color="#0f454a"/>
      <stop offset="1" stop-color="#156e75"/>
    </linearGradient>
    <linearGradient id="sci-petal" x1="50" y1="22" x2="50" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0fdff"/>
      <stop offset="1" stop-color="#d4f4f7"/>
    </linearGradient>
    <linearGradient id="sci-core" x1="50" y1="36" x2="50" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8fbfc"/>
    </linearGradient>
    <clipPath id="sci-clip">
      <rect width="100" height="100" rx="22"/>
    </clipPath>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#sci-pond)"/>
  <!-- Concentric wavefronts (point source — cylindrical symmetry) -->
  <g clip-path="url(#sci-clip)">
    <circle cx="50" cy="66" r="13.5" stroke="#8ae0dc" stroke-opacity="0.28" stroke-width="1.25" fill="none"/>
    <circle cx="50" cy="66" r="25.5" stroke="#9fe8e4" stroke-opacity="0.36" stroke-width="1.15" fill="none"/>
    <circle cx="50" cy="66" r="37.5" stroke="#b4f0ec" stroke-opacity="0.44" stroke-width="1.05" fill="none"/>
    <circle cx="50" cy="66" r="49.5" stroke="#c9f7f4" stroke-opacity="0.38" stroke-width="0.95" fill="none"/>
  </g>
  <!-- Hexagonal bloom: 6 equal sectors (6-fold / crystalline) -->
  <g transform="translate(50 42)">
    <ellipse cx="0" cy="-14" rx="9" ry="21" fill="url(#sci-petal)" stroke="#6ec9cf" stroke-opacity="0.65" stroke-width="0.55" transform="rotate(0)"/>
    <ellipse cx="0" cy="-14" rx="9" ry="21" fill="url(#sci-petal)" stroke="#6ec9cf" stroke-opacity="0.65" stroke-width="0.55" transform="rotate(60)"/>
    <ellipse cx="0" cy="-14" rx="9" ry="21" fill="url(#sci-petal)" stroke="#6ec9cf" stroke-opacity="0.65" stroke-width="0.55" transform="rotate(120)"/>
    <ellipse cx="0" cy="-14" rx="9" ry="21" fill="url(#sci-petal)" stroke="#6ec9cf" stroke-opacity="0.65" stroke-width="0.55" transform="rotate(180)"/>
    <ellipse cx="0" cy="-14" rx="9" ry="21" fill="url(#sci-petal)" stroke="#6ec9cf" stroke-opacity="0.65" stroke-width="0.55" transform="rotate(240)"/>
    <ellipse cx="0" cy="-14" rx="9" ry="21" fill="url(#sci-petal)" stroke="#6ec9cf" stroke-opacity="0.65" stroke-width="0.55" transform="rotate(300)"/>
  </g>
  <circle cx="50" cy="42" r="8" fill="url(#sci-core)" stroke="#5bc4cc" stroke-opacity="0.75" stroke-width="0.65"/>
  <circle cx="50" cy="42" r="3.6" fill="#0a4a50" fill-opacity="0.35"/>
</svg>
